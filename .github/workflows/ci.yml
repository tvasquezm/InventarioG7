name: CI

# Integracion continua del Inventory Service (Grupo 7).
# Valida en cada push/PR que el codigo compila (typecheck + build).
# El despliegue continuo (CD) lo hace Render automaticamente al mergear a main.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Typecheck y Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build (compilar a dist/)
        run: npm run build
