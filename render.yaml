# Blueprint de Render para el Inventory Service (Grupo 7)
# Despliegue: Render -> New + -> Blueprint -> seleccionar este repo.
services:
  - type: web
    name: inventario-g7
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
